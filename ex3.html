<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>예제3</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-stone-50 text-stone-800 scroll-smooth">
    <header
      class="sticky top-0 z-50 bg-white/90 backdrop-blur border-b border-stone-200"
    >
      <div
        class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between"
      >
        <h1 class="text-xl font-bold text-green-700">Leaf & Ladle</h1>
        <nav class="hidden md:flex gap-6 text-sm font-medium">
          <a href="#intro" class="hover:text-green-600">대표 음식</a>
          <a href="#menu" class="hover:text-green-600">인기 메뉴</a>
          <a href="#tips" class="hover:text-green-600">레시피/팁</a>
          <a href="#trend" class="hover:text-green-600">트렌드</a>
        </nav>
      </div>
    </header>

    <section id="intro" class="max-w-6xl mx-auto px-6 py-20">
      <h2 class="text-4xl font-bold mb-4">비건 한 접시의 시작</h2>
      <p class="text-stone-600 max-w-2xl">
        식물성 재료를 중심으로 건강함과 맛, 지속가능성을 함께 담은 푸드 스타일
      </p>
    </section>

    <section id="menu" class="max-w-6xl mx-auto px-6 py-20">
      <h2 class="text-3xl font-bold mb-6">인기 메뉴</h2>
    </section>

    <section id="tips" class="max-w-6xl mx-auto px-6 py-20">
      <h2 class="text-3xl font-bold mb-6">레시피/팁</h2>
    </section>

    <section id="trend" class="max-w-6xl mx-auto px-6 py-20">
      <h2 class="text-3xl font-bold mb-6">트렌드</h2>
    </section>
  </body>
</html>
